<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InternBuddy LMS Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6a5acd, #00c6ff);
}

/* ===== PARTICLES ===== */
#particles {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
}

/* ===== LOGIN CARD ===== */
.login-box {
    position: relative;
    z-index: 2;
    width: 380px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 10px 50px rgba(0,0,0,0.3);
    color: #fff;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
}

/* ===== TITLE FIXED CENTER ===== */
.typing-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.typing {
    font-size: 26px;
    font-weight: bold;
    border-right: 2px solid white;
    white-space: nowrap;
    overflow: hidden;

    width: 0;
    animation: typing 3s steps(20) forwards, blink 0.7s infinite;
}

/* animation FIXED */
@keyframes typing {
    from { width: 0 }
    to { width: 240px }
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* ===== INPUT ===== */
.input-group {
    margin-top: 20px;
    text-align: left;
}

.input-group label {
    font-size: 13px;
}

.input-group input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 5px;
    outline: none;
    transition: 0.3s;
}

/* FOCUS ANIMATION */
.input-group input:focus {
    box-shadow: 0 0 12px rgba(0,198,255,0.8);
    transform: scale(1.02);
}

/* PASSWORD */
.password-wrapper {
    position: relative;
}

.toggle-password {
    position: absolute;
    right: 10px;
    top: 38px;
    cursor: pointer;
    color: #333;
}

/* ===== BUTTON ===== */
.login-btn {
    margin-top: 25px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #00c6ff, #6a5acd);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER */
.login-btn:hover {
    box-shadow: 0 0 20px rgba(0,198,255,0.9);
    transform: translateY(-2px);
}

/* LOADER */
.loader {
    border: 3px solid rgba(255,255,255,0.3);
    border-top: 3px solid white;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    animation: spin 1s linear infinite;
    display: inline-block;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* ERROR */
.error {
    color: #ff4d4d;
    margin-top: 10px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="login-box">

    <!-- ✅ FIXED TITLE -->
    <div class="typing-wrapper">
        <div class="typing">InternBuddy LMS</div>
    </div>

    <p>Login using your internship credentials</p>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" autocomplete="username">
    </div>

    <div class="input-group password-wrapper">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password">
        <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <button class="login-btn" id="loginBtn" onclick="login()">
        Login
    </button>

    <p id="error" class="error"></p>

</div>

<script src="/static/js/lms_login.js"></script>

<!-- PARTICLES -->
<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 1,
        dx: Math.random() * 0.5,
        dy: Math.random() * 0.5
    });
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x > canvas.width) p.x = 0;
        if (p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
